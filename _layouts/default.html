<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    :root {
      --bg: #f7f8fa; --card: #ffffff; --ink: #1f2937; --muted: #6b7280;
      --line: #e5e7eb; --accent: #4338ca; --accent-soft: #eef2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 0 20px 80px; }
    header.site {
      border-bottom: 1px solid var(--line); background: var(--card);
    }
    header.site .wrap { padding-top: 22px; padding-bottom: 22px; }
    header.site h1 { margin: 0; font-size: 20px; letter-spacing: -0.01em; }
    header.site h1 a { color: var(--ink); }
    header.site p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    main .wrap { padding-top: 32px; }
    h2 { font-size: 22px; margin: 1.8em 0 0.6em; letter-spacing: -0.01em; }
    h3 { font-size: 17px; margin: 1.4em 0 0.4em; }
    hr { border: none; border-top: 1px solid var(--line); margin: 1.6em 0; }
    code {
      background: var(--accent-soft); color: var(--accent);
      padding: 1px 5px; border-radius: 4px; font-size: 0.88em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    pre {
      background: #0f172a; color: #e2e8f0; padding: 14px 16px; border-radius: 10px;
      overflow-x: auto; font-size: 13px; line-height: 1.5;
    }
    pre code { background: none; color: inherit; padding: 0; }
    .rel-list { list-style: none; padding: 0; margin: 0; }
    .rel-list li {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px 18px; margin-bottom: 12px; transition: border-color .12s, box-shadow .12s;
    }
    .rel-list li:hover { border-color: #c7d2fe; box-shadow: 0 1px 8px rgba(67,56,202,0.06); }
    .rel-list .ver { font-weight: 700; font-size: 16px; }
    .rel-list .title { color: var(--muted); margin-left: 8px; font-size: 14px; }
    .rel-list .date { float: right; color: var(--muted); font-size: 13px; }
    .badge {
      display: inline-block; font-size: 11px; font-weight: 600; vertical-align: middle;
      background: #fef3c7; color: #92400e; border-radius: 6px; padding: 1px 6px; margin-left: 6px;
    }
    .rel-meta { color: var(--muted); font-size: 14px; margin: 0 0 1.5em; }
    .back { display: inline-block; margin-bottom: 18px; font-size: 14px; }
    footer.site { color: var(--muted); font-size: 13px; border-top: 1px solid var(--line); }
    footer.site .wrap { padding-top: 18px; padding-bottom: 40px; }
  </style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
    </div>
  </header>
  <main>
    <div class="wrap">
      {{ content }}
    </div>
  </main>
  <footer class="site">
    <div class="wrap">
      Generated from GitHub Releases · <a href="https://github.com/tcnos/infinity-releases">infinity-releases</a>
    </div>
  </footer>
</body>
</html>
