title: Infinity Release Notes
description: Product release notes for the Infinity investment platform.
# Served from a custom domain (CNAME: releases.invos.in) at the root path,
# so baseurl MUST be empty — a non-empty baseurl makes relative_url links
# (internal release pages, back links) 404 on the custom domain.
baseurl: ""
url: "https://releases.invos.in"

# Each file in _releases becomes its own page at /releases/<tag>/
collections:
  releases:
    output: true
    permalink: /releases/:name/

defaults:
  - scope:
      path: ""
      type: releases
    values:
      layout: release

# GitHub Pages builds in safe mode; no custom plugins are used here.
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - README.md
  - scripts/
  - Gemfile
  - Gemfile.lock
